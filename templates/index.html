<!DOCTYPE html>
<html>
<head>
    <title>Security Scanner Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        h1 { color: #2c3e50; }
        input, button { padding: 8px; margin: 5px; }
        .result { margin-top: 20px; padding: 15px; border: 1px solid #ddd; background: #f9f9f9; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <h1>Security Scanner Dashboard</h1>
    <form method="post">
        <label>IP Address:</label>
        <input type="text" name="host" required placeholder="127.0.0.1">
        <label>Ports (comma-separated):</label>
        <input type="text" name="ports" required placeholder="22,80">
        <button type="submit">Scan</button>
    </form>

    {% if result %}
    <div class="result">
        <h2>Scan Results:</h2>
        <table>
            <tr>
                <th>Port</th>
                <th>Service</th>
                <th>AI Risk</th>
            </tr>
            {% for r in result %}
            <tr>
                <td>{{ r.port }}</td>
                <td>{{ r.service }}</td>
                <td>{{ r.ai }}</td>
            </tr>
            {% endfor %}
        </table>
    </div>
    {% endif %}
</body>
</html>
